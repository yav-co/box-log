const SUPABASE_URL = "https://qcvgrunrvuvlreoihwlv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjdmdydW5ydnV2bHJlb2lod2x2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0MzA2ODQsImV4cCI6MjA5OTAwNjY4NH0.XD3y29-8kDkUY-YCZkaawTYW_Zk-pirvxOOz-SVBq1o";

function supaConfigured() {
  return SUPABASE_URL.startsWith("https://") && !SUPABASE_URL.includes("あなたの")
    && SUPABASE_ANON_KEY.length > 20 && !SUPABASE_ANON_KEY.includes("あなたの");
}
const supaHeaders = () => ({
  apikey: SUPABASE_ANON_KEY,
  Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
  "Content-Type": "application/json",
});
async function supaGet(key) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/gymlog?key=eq.${encodeURIComponent(key)}&select=value`, { headers: supaHeaders() });
  if (!r.ok) throw new Error("supabase get " + r.status);
  const rows = await r.json();
  return rows.length ? safeParse(rows[0].value, null) : null;
}
async function supaSet(key, obj) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/gymlog`, {
    method: "POST",
    headers: { ...supaHeaders(), Prefer: "resolution=merge-duplicates" },
    body: JSON.stringify({ key, value: JSON.stringify(obj) }),
  });
  if (!r.ok) throw new Error("supabase set " + r.status);
}
async function supaWorks() {
  try { await supaSet("selftest", { t: Date.now() }); const b = await supaGet("selftest"); return !!b; }
  catch (e) { return false; }
}

function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function pad(n) { return String(n).padStart(2, "0"); }
function fmtTime(iso) { const d = new Date(iso); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function fmtDay(iso) {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} (${["日","月","火","水","木","金","土"][d.getDay()]})`;
}
function dayKey(iso) { const d = new Date(iso); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function safeParse(raw, fallback) { try { const d = JSON.parse(raw); return d || fallback; } catch (e) { return fallback; } }
function ytId(url) {
  if (!url) return null;
  const m = String(url).match(/(?:youtu\.be\/|[?&]v=|shorts\/|embed\/|live\/)([\w-]{11})/);
  return m ? m[1] : null;
}
function fmtCat(label) {
  if (!label) return "";
  const i = label.indexOf("・");

}

// ---------- ストレージ層(Supabase → 共有ストレージ → localStorage の順で自動選択) ----------
async function storageWorks(shared) {
  if (typeof window === "undefined" || !window.storage || typeof window.storage.set !== "function") return false;
  try {
    const stamp = String(Date.now());
    await window.storage.set("gymlog-selftest", stamp, shared);
    const back = await window.storage.get("gymlog-selftest", shared);
    return !!(back && back.value === stamp);
  } catch (e) { return false; }
}
function localWorks() {
  try { window.localStorage.setItem("t", "1"); window.localStorage.removeItem("t"); return true; } catch (e) { return false; }
}

// 個人データ(メモ本文・非公開動画) — supabaseではユーザー名ごとのキーに保存
async function loadMe(mode, user) {
  const empty = { entries: [] };
  if (mode === "supabase") {
    if (!user) return empty;
    try { return (await supaGet(`me:${user}`)) || empty; } catch (e) { return empty; }
  }
  if (mode === "app") {
    try { const r = await window.storage.get(ME_KEY, false); return r && r.value ? safeParse(r.value, empty) : empty; }
    catch (e) { return empty; }
  }
  if (mode === "local") return safeParse(window.localStorage.getItem(ME_KEY), empty);
  return empty;
}
async function saveMe(mode, user, me) {
  if (mode === "supabase") { if (!user) throw new Error("名前を先に設定してください"); await supaSet(`me:${user}`, me); return; }
  if (mode === "app") { await window.storage.set(ME_KEY, JSON.stringify(me), false); return; }
  if (mode === "local") { window.localStorage.setItem(ME_KEY, JSON.stringify(me)); return; }
  throw new Error("保存先なし");
}

function mergeFeed(a, b) {
  const map = new Map();
  [...a, ...b].forEach((s) => {
    const prev = map.get(s.id);
    if (!prev) map.set(s.id, { ...s, likes: [...new Set(s.likes || [])] });
    else map.set(s.id, { ...prev, ...s, likes: [...new Set([...(prev.likes||[]), ...(s.likes||[])])] });
  });
  return [...map.values()].sort((x, y) => (x.ts < y.ts ? 1 : -1)).slice(0, 200);
}

// 共有データ(タイムライン)
async function loadFeed(fmode) {
  const empty = { items: [] };
  if (fmode === "supabase") {
    try { return (await supaGet(FEED_KEY)) || empty; } catch (e) { return empty; }
  }
  if (fmode === "shared") {
    try { const r = await window.storage.get(FEED_KEY, true); return r && r.value ? safeParse(r.value, empty) : empty; }
    catch (e) { return empty; }
  }
  return safeParse(window.localStorage.getItem(FEED_KEY), empty);
}
async function saveFeed(fmode, feed) {
  if (fmode === "supabase") {
    const remote = await loadFeed("supabase");
    const merged = { items: mergeFeed(remote.items, feed.items) };
    await supaSet(FEED_KEY, merged);
    return merged;
  }
  if (fmode === "shared") {
    const remote = await loadFeed("shared");
    const merged = { items: mergeFeed(remote.items, feed.items) };
    await window.storage.set(FEED_KEY, JSON.stringify(merged), true);
    return merged;
  }
  if (localWorks()) window.localStorage.setItem(FEED_KEY, JSON.stringify(feed));
  return feed;
}

// 目安箱(共有・管理者コードで閲覧)
async function fbLoad(fmode) {
  const empty = { items: [] };
  if (fmode === "supabase") { try { return (await supaGet(FB_KEY)) || empty; } catch (e) { return empty; } }
  if (fmode === "shared") {
    try { const r = await window.storage.get(FB_KEY, true); return r && r.value ? safeParse(r.value, empty) : empty; }
    catch (e) { return empty; }
  }
  return safeParse(window.localStorage.getItem(FB_KEY), empty);
}
async function fbSave(fmode, payload) {
  const list = await fbLoad(fmode);
  list.items = [payload, ...(list.items || [])].slice(0, 300);
  if (fmode === "supabase") { await supaSet(FB_KEY, list); return; }
  if (fmode === "shared") { await window.storage.set(FB_KEY, JSON.stringify(list), true); return; }
  if (localWorks()) window.localStorage.setItem(FB_KEY, JSON.stringify(list));
}

// ---------- 小物 ----------
function CountUp({ value }) {
  const [disp, setDisp] = useState(0);
  const raf = useRef(null);
  useEffect(() => {
    const start = performance.now(); const from = disp, to = value, dur = 700;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / dur);
      setDisp(Math.round(from + (to - from) * (1 - Math.pow(1 - t, 3))));
      if (t < 1) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [value]); // eslint-disable-line
  return <span>{disp}</span>;
}

function YTCard({ url, maxWidth = 260 }) {
  const [playing, setPlaying] = useState(false);
  const id = ytId(url);
  if (!id) return null;
  if (playing) {
    return (
      <div style={{ maxWidth, width: "100%", marginTop: 8 }}>
        <div style={{
          position: "relative", width: "100%", aspectRatio: "16/9",
          border: `1px solid ${C.blue}`, borderRadius: 10, overflow: "hidden",
          background: "#000", boxShadow: "0 0 16px rgba(46,168,255,0.25)",

            src={`https://www.youtube.com/embed/${id}?playsinline=1&autoplay=1&rel=0`}
            title="練習動画"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowFullScreen
            style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: 0 }}

          <button onClick={() => window.open(url, "_blank")} style={{ fontSize: 11, color: C.mut, background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "inherit", textDecoration: "underline" }}>YouTubeで開く</button>
          <button onClick={() => setPlaying(false)} style={{ fontSize: 11, color: C.mut, background: "none", border: "none", cursor: "pointer", padding: 0, fontFamily: "inherit", textDecoration: "underline" }}>閉じる</button>
        </div>

    <button onClick={() => setPlaying(true)} aria-label="動画をこの場で再生" style={{
      display: "block", width: "100%", maxWidth, position: "relative",

        style={{ width: "100%", display: "block", aspectRatio: "16/9", objectFit: "cover", opacity: 0.85 }}/>
      <span style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <span style={{ width: 44, height: 44, borderRadius: "50%", background: "rgba(5,7,13,0.75)", border: `2px solid ${C.cyan}`, display: "flex", alignItems: "center", justifyContent: "center", color: C.cyan, fontSize: 16 }}>▶</span>

function GymLog() {
  const [page, setPage] = useState("home"); // "home" | "suggestion"
  const [meMode, setMeMode] = useState("checking");   // "supabase" | "app" | "local" | "none"
  const [feedMode, setFeedMode] = useState("local");  // "supabase" | "shared" | "local"
  const [user, setUser] = useState("");
  const [me, setMe] = useState({ entries: [] });
  const [feedData, setFeedData] = useState({ items: [] });
  const [loaded, setLoaded] = useState(false);
  const [notice, setNotice] = useState("");
  const [nameInput, setNameInput] = useState("");

  // メモフォーム
  const now = new Date();
  const [time, setTime] = useState(`${pad(now.getHours())}:${pad(now.getMinutes())}`);
  const [disc, setDisc] = useState(DISCIPLINES[0]);
  const [cat, setCat] = useState(BASE_CATS[0]);
  const [freeCat, setFreeCat] = useState("");
  const [draft, setDraft] = useState({ good: "", reflect: "", next: "", learned: "", focusMemo: "" });
  const [savedFlash, setSavedFlash] = useState(false);
  const [openPast, setOpenPast] = useState(null);
  const [likersOpen, setLikersOpen] = useState(null); // ホバー/タップ中の投稿id
  const [playing, setPlaying] = useState(null); // インライン再生中: "preview" | フィード投稿id

  // 動画
  const [videoUrl, setVideoUrl] = useState("");
  const [privacy, setPrivacy] = useState("unlisted");

  // ダッシュボード期間選択
  const [period, setPeriod] = useState("week"); // "week" | "month" | "year"

  // 目安箱
  const [fb, setFb] = useState("");
  const [fbSending, setFbSending] = useState(false);
  const [fbDone, setFbDone] = useState(false);
  const [adminCode, setAdminCode] = useState("");
  const [adminList, setAdminList] = useState(null); // null=非表示

  useEffect(() => {
    (async () => {
      let storedUser = "";
      try {
        const u = window.localStorage.getItem(USER_KEY);
        if (u && u.trim()) storedUser = u.trim();
      } catch (e) { /* ignore */ }

      let m, f;
      if (supaConfigured() && (await supaWorks())) {
        m = "supabase"; f = "supabase";
      } else {
        const personal = await storageWorks(false);
        const shared = await storageWorks(true);
        m = personal ? "app" : localWorks() ? "local" : "none";
        f = shared ? "shared" : "local";
      }
      setMeMode(m);
      setFeedMode(f);
      if (storedUser) setUser(storedUser);
      setMe(await loadMe(m, storedUser));
      setFeedData(await loadFeed(f));
      setLoaded(true);
    })();
  }, []);

  // タイムラインを60秒ごとに自動更新(仲間のナイスファイト!や投稿を取り込む)
  useEffect(() => {
    if (!loaded) return;
    const iv = setInterval(async () => {
      try { setFeedData(await loadFeed(feedMode)); } catch (e) { /* ignore */ }
    }, 60000);
    return () => clearInterval(iv);
  }, [loaded, feedMode]);

  // タイムラインの自動同期(30秒ごとに静かに取得・マージ)
  useEffect(() => {
    if (!loaded || feedMode === "local") return;
    const iv = setInterval(async () => {
      try {
        const d = await loadFeed(feedMode);
        setFeedData((prev) => ({ items: mergeFeed(prev.items, d.items) }));
      } catch (e) { /* offline等は無視 */ }
    }, 30000);
    return () => clearInterval(iv);
  }, [loaded, feedMode]);

  // Supabaseモードでは名前変更時にその人のメモを読み直す
  useEffect(() => {
    if (loaded && meMode === "supabase" && user) {
      (async () => setMe(await loadMe("supabase", user)))();
    }
  }, [user, meMode, loaded]); // eslint-disable-line

  const flash = (msg) => { setNotice(msg); setTimeout(() => setNotice(""), 2400); };
  const pickUser = (u) => { setUser(u); try { window.localStorage.setItem(USER_KEY, u); } catch (e) {} };

  const customCats = me.customCats || [];

  // 前回の「次回の練習で意識すること」を引き継ぐ
  const prevFocus = (() => {
    const withNext = me.entries.filter((e) => (e.next || "").trim()).sort((a, b) => (a.ts < b.ts ? 1 : -1));
    return withNext[0] || null;
  })();

  const saveEntry = async (video = null) => {
    const category = cat === "__free__" ? (freeCat.trim() || "その他") : cat;
    const [h, mi] = time.split(":").map(Number);
    const ts = new Date(); ts.setHours(h ?? 0, mi ?? 0, 0, 0);
    const entry = { id: uid(), ts: ts.toISOString(), discipline: disc, category, ...draft };
    // 自由回答カテゴリは次回以降の選択肢に追加
    let nextCustom = customCats;
    if (cat === "__free__" && category !== "その他" && !BASE_CATS.includes(category) && !customCats.includes(category)) {
      nextCustom = [...customCats, category];
    }
    const nextMe = { ...me, entries: [entry, ...me.entries], customCats: nextCustom };
    setMe(nextMe);
    if (cat === "__free__") { setCat(category !== "その他" ? category : BASE_CATS[0]); setFreeCat(""); }
    try { await saveMe(meMode, user, nextMe); } catch (e) { flash("メモの保存に失敗しました"); return; }
    // フィードにはメタ情報のみ共有（メモ本文は載せない）
    const item = { id: entry.id, user, ts: entry.ts, category: `${disc}(${category})`, likes: [], video: video && video.privacy === "unlisted" ? video : null };
    try { setFeedData(await saveFeed(feedMode, { items: mergeFeed(feedData.items, [item]) })); } catch (e) { /* feed失敗はメモに影響なし */ }
    setDraft({ good: "", reflect: "", next: "", learned: "", focusMemo: "" });
    setSavedFlash(true); setTimeout(() => setSavedFlash(false), 1800);
  };

  const deleteEntry = async (id) => {
    const nextMe = { ...me, entries: me.entries.filter((e) => e.id !== id), customCats };
    setMe(nextMe); setOpenPast(null);
    try { await saveMe(meMode, user, nextMe); } catch (e) {}
  };

  const like = async (id) => {
    const target = feedData.items.find((s) => s.id === id);
    if (target && target.likes.includes(user)) { flash("ナイスファイト済みです🥊"); return; }
    const items = feedData.items.map((s) =>
      s.id === id ? { ...s, likes: [...new Set([...s.likes, user])] } : s
    );
    // saveFeedがクラウド上の最新データと結合して保存するため、全員の画面で同期される
    try { setFeedData(await saveFeed(feedMode, { items })); } catch (e) { flash("同期に失敗しました。通信を確認してください"); }
  };

  const refreshFeed = async () => {
    setFeedData(await loadFeed(feedMode));
    flash("タイムラインを更新しました");
  };

  const saveVideo = async () => {
    const url = videoUrl.trim();
    if (!ytId(url)) { flash("YouTubeのURLを確認してください"); return; }
    if (privacy === "unlisted") {
      // 限定公開: タイムラインへ共有
      const item = { id: uid(), user, ts: new Date().toISOString(), category: "練習動画", likes: [], video: { privacy, url } };
      try { setFeedData(await saveFeed(feedMode, { items: mergeFeed(feedData.items, [item]) })); } catch (e) {}
      flash("タイムラインに動画を共有しました");
    } else {
      // 非公開: 自分のデータにのみ保存
      const nextMe = { ...me, entries: me.entries, customCats, videos: [{ id: uid(), ts: new Date().toISOString(), url }, ...(me.videos || [])] };
      setMe(nextMe);
      try { await saveMe(meMode, user, nextMe); } catch (e) { flash("保存に失敗しました"); return; }
      flash("非公開で保存しました（自分だけ）");
    }
    setVideoUrl("");
  };

  const deleteVideo = async (id) => {
    const nextMe = { ...me, videos: (me.videos || []).filter((v) => v.id !== id) };
    setMe(nextMe);
    try { await saveMe(meMode, user, nextMe); } catch (e) {}
  };

  const sendFeedback = async () => {
    if (!fb.trim()) return;
    setFbSending(true);
    const payload = { id: uid(), sentAt: new Date().toISOString(), user, text: fb.trim() };
    // 確実な保存先(Supabase or 共有ストレージ、管理者コードでのみ閲覧)
    try { await fbSave(feedMode, payload); } catch (e) { /* ignore */ }
    if (FEEDBACK_ENDPOINT_URL) {
      // GASはJSONのpreflightに応答できないため、no-cors + text/plainで送信(レスポンスは読まない)
      try {
        await fetch(FEEDBACK_ENDPOINT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload),
        });
      } catch (e) { /* 失敗してもUXは完了扱い */ }
    }
    setTimeout(() => { setFbSending(false); setFbDone(true); setFb(""); }, 1400);
  };

  // ダッシュボード集計（自分のみ）
  const periodStart = (p) => {
    const d = new Date();
    if (p === "week") { d.setDate(d.getDate() - d.getDay()); }
    else if (p === "month") { d.setDate(1); }
    else { d.setMonth(0, 1); }
    d.setHours(0, 0, 0, 0);
    return d;
  };
  const countIn = (p) => me.entries.filter((s) => new Date(s.ts) >= periodStart(p)).length;
  const weekCount = countIn("week");
  const monthCount = countIn("month");
  const yearCount = countIn("year");
  const PERIOD_LABEL = { week: "今週", month: "今月", year: "今年" };
  // 選択中の期間について「種目 × カテゴリ」のマトリクスを集計(ヒートマップ用)
  const heat = (() => {
    const from = periodStart(period);
    const inPeriod = me.entries.filter((s) => new Date(s.ts) >= from);
    const cols = [...BASE_CATS, ...customCats];
    inPeriod.forEach((s) => { if (s.category && !cols.includes(s.category)) cols.push(s.category); });
    const counts = {};
    let max = 0, total = 0;
    inPeriod.forEach((s) => {
      const d = s.discipline || "その他";
      const k = `${d}||${s.category}`;
      counts[k] = (counts[k] || 0) + 1;
      max = Math.max(max, counts[k]);
      total++;
    });
    return { cols, counts, max, total };
  })();

  // ---- AIコーチ: 今週の練習バランスから条件分岐でアドバイスを生成 ----
  const coachAdvice = (() => {
    if (me.entries.length === 0) {
      return { tag: "READY", text: "記録を始めると、ここにAIコーチのアドバイスが表示されます。まずは今日の練習から！" };
    }
    const newest = me.entries.reduce((a, b) => (a.ts > b.ts ? a : b));
    const daysSince = (Date.now() - new Date(newest.ts).getTime()) / 86400000;
    if (daysSince >= 3) {
      return { tag: "REST DETECTED", text: "お疲れ気味ですか？焦る必要はありません。まずは5分間のシャドー（ドリル）か、軽いロードワークからギアを入れ直していきましょう！" };
    }
    const from = periodStart("week");
    const wk = me.entries.filter((s) => new Date(s.ts) >= from);
    const total = wk.length;
    if (total < 2) {
      return { tag: "WARMING UP", text: "今週のスタートを切りました！記録が増えるほどアドバイスの精度が上がります。この調子で積み上げていきましょう。" };
    }
    const c = (name) => wk.filter((s) => s.category === name).length;
    if ((c("ミット") + c("スパー")) / total >= 0.6) {
      return { tag: "COMBAT HEAVY", text: "今週は実戦中心の非常に熱い内容です！ただ、体が硬くなっている可能性があるので、怪我予防のために「筋トレ」や入念なストレッチの時間も確保しましょう。" };
    }
    if (c("ラン") / total >= 0.4) {
      return { tag: "STAMINA BUILD", text: "素晴らしい走り込み量です！基礎体力が大幅に向上しています。次はこのスタミナを活かして、手数と連打を意識したメニューを組み込みましょう。" };
    }
    return { tag: "PERFECT BALANCE", text: "完璧なワークアウトバランスです！全てのメニューが網羅されており、理想的な成長曲線を描いています。この調子でコンディションを維持してください。" };
  })();

  // 回数→セル色(0: ブランク / 多いほど鮮やかなブルー)
  const heatStyle = (c) => {
    if (!c) return { background: "rgba(255,255,255,0.02)", border: `1px solid ${C.line}`, color: "transparent" };
    const t = Math.min(1, c / 4); // 4回以上で最大強度
    const alpha = 0.22 + 0.78 * t;
    return {
      background: `rgba(46, 168, 255, ${alpha.toFixed(2)})`,
      border: `1px solid rgba(95, 217, 255, ${(0.3 + 0.5 * t).toFixed(2)})`,
      boxShadow: t >= 0.75 ? "0 0 12px rgba(46,168,255,0.55)" : "none",
      color: t >= 0.6 ? "#05070D" : C.cyan,
    };
  };

  const feed = [...feedData.items].sort((a, b) => (a.ts < b.ts ? 1 : -1)).slice(0, 60);
  const feedByDay = {};
  feed.forEach((s) => { const k = dayKey(s.ts); (feedByDay[k] = feedByDay[k] || []).push(s); });

  const input = { width: "100%", background: "#0A101E", border: `1px solid ${C.line}`, borderRadius: 10, color: C.text, fontSize: 15, padding: "12px 12px", fontFamily: "inherit" };

    background: `linear-gradient(180deg, ${C.panel2} 0%, ${C.panel} 100%)`,

  const eyebrow = { fontFamily: "'Rajdhani', sans-serif", letterSpacing: "0.28em", fontSize: 12, color: C.cyan, fontWeight: 700, marginBottom: 10, textTransform: "uppercase" };

  // ============ 目安箱ページ ============
  if (page === "suggestion") {

      <Shell>

            }}>
              {fbSending ? <span style={{ fontFamily: "'Share Tech Mono', monospace" }}>TRANSMITTING<span className="blink">_</span></span> : "送信"}
            </button>

          {/* 管理者のみ: 送信された意見の閲覧(コードでロック) */}

                }}>閲覧</button>
              </div>
            ) : (

                <div style={{ fontSize: 12, color: C.mut, marginBottom: 8 }}>受信済みの意見({adminList.length}件)</div>

                {adminList.map((f0) => (

                  marginTop: 4, padding: "8px 18px", borderRadius: 10, border: `1px solid ${C.line}`,
                  background: "none", color: C.mut, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                }}>閉じる</button>
              </div>
            )}
          </section>
        </main>
        {fbDone && (

            <div style={{ fontSize: 14, lineHeight: 1.8 }}>ありがとうございます！<br/>管理者へ送信されました</div>
          </Popup>

      </Shell>
    );
  }

  // ============ ホーム(自分のページ) ============
  return (
    <Shell>
      <header style={{ padding: "18px 16px 0", maxWidth: 640, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <GloveMark/>
            <div>
              <div style={{ fontFamily: "'Rajdhani', sans-serif", fontSize: 22, fontWeight: 700, letterSpacing: "0.14em", lineHeight: 1 }}>
                {user ? `${user} のページ` : "BOX-LOG"}
              </div>
              <div style={{ fontSize: 11, color: C.mut, marginTop: 3 }}>
                {feedMode === "supabase" ? "Supabase同期: 仲間とリアルタイム共有中" : feedMode === "shared" ? "共有モード: 仲間と同期中(メモの中身は自分だけ)" : "ソロモード: この端末のみ(Supabaseを設定すると仲間と共有できます)"}
              </div>
            </div>
          </div>
          {user && (
            <button onClick={() => { setNameInput(user); setUser(""); }} aria-label="名前を変更" style={{

          )}
        </div>
        <Circuit style={{ marginTop: 12 }}/>
      </header>

      <main style={{ padding: "8px 16px 60px", maxWidth: 640, margin: "0 auto" }}>
        {notice && <div style={{ ...card, borderColor: C.deep, color: C.cyan, fontSize: 13, padding: "10px 12px" }}>{notice}</div>}

        {/* 初回のみ: 名前の設定(以後は自分のページに直行) */}
        {loaded && !user && (
          <section style={{ ...card, borderColor: C.blue }}>
            <div style={eyebrow}>FIRST SETUP — 名前を入力(初回のみ)</div>
            <div style={{ fontSize: 12, color: C.mut, marginBottom: 10 }}>タイムラインに表示される名前です(ニックネームOK)</div>
            <div style={{ display: "flex", gap: 8 }}>
              <input
                value={nameInput}
                onChange={(e) => setNameInput(e.target.value)}
                placeholder="例: ユウキ"
                maxLength={12}
                style={{ ...input, flex: 1 }}
              />
              <button
                onClick={() => { if (nameInput.trim()) { pickUser(nameInput.trim()); setNameInput(""); } }}
                disabled={!nameInput.trim()}
                style={{
                  padding: "0 22px", borderRadius: 10, border: "none", fontFamily: "inherit",
                  background: nameInput.trim() ? `linear-gradient(90deg, ${C.deep}, ${C.blue})` : "#16263F",
                  color: nameInput.trim() ? "#fff" : C.mut, fontSize: 15, fontWeight: 700, cursor: "pointer",
                }}

        {/* ===== 1. 今回の練習で意識すること(前回から引き継ぎ) ===== */}
        {prevFocus ? (
          <section style={{ ...card, borderColor: C.blue }}>

            <div style={{ fontSize: 16, fontWeight: 700, lineHeight: 1.7, whiteSpace: "pre-wrap" }}>{prevFocus.next}</div>

            <input type="text" value={draft.focusMemo}
              onChange={(e) => setDraft({ ...draft, focusMemo: e.target.value })}

        ) : (

            <div style={eyebrow}>FOCUS — 今回の練習で意識すること</div>

              下のメモで「次回の練習で意識すること」を書くと、次からここに表示され、一言メモを残せます。
            </div>
          </section>
        )}

        {/* ===== 2. 練習メモ(メイン) ===== */}
        <section style={card}>
          <div style={eyebrow}>PRACTICE MEMO — 今日の練習メモ</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>

              <div style={{ fontSize: 11, color: C.mut, marginBottom: 4 }}>時間</div>
              <input type="time" value={time} onChange={(e) => setTime(e.target.value)} aria-label="練習時刻"
                style={{ ...input, padding: "12px 0", textAlign: "center", fontSize: 13,
                  WebkitAppearance: "none", appearance: "none",

              <select value={disc} onChange={(e) => setDisc(e.target.value)} style={{ ...input, padding: "12px 6px" }} aria-label="種目">
                {DISCIPLINES.map((d0) => <option key={d0} value={d0}>{d0}</option>)}
              </select>
            </div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 11, color: C.mut, marginBottom: 4 }}>カテゴリ</div>
              <select value={cat} onChange={(e) => setCat(e.target.value)} style={{ ...input, padding: "12px 6px" }} aria-label="カテゴリ">
                {[...BASE_CATS, ...customCats].map((c0) => <option key={c0} value={c0}>{c0}</option>)}
                <option value="__free__">その他（自由回答）</option>
              </select>
            </div>
          </div>
          {cat === "__free__" && <input value={freeCat} onChange={(e) => setFreeCat(e.target.value)} placeholder="カテゴリ名を入力（次回から選択肢に追加されます）" style={{ ...input, marginTop: -4, marginBottom: 12 }}/>}
          {MEMO_FIELDS.map((f) => (
            <div key={f.key} style={{ marginBottom: 12 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, fontWeight: 700, marginBottom: 6 }}>
                <span style={{ width: 8, height: 8, borderRadius: 2, background: f.accent, flexShrink: 0 }}/>
                {f.label}
              </label>
              <textarea value={draft[f.key]} onChange={(e) => setDraft({ ...draft, [f.key]: e.target.value })}
                placeholder={f.ph} rows={2} style={{ ...input, resize: "vertical", lineHeight: 1.6 }}/>
            </div>
          ))}
          <button onClick={() => saveEntry(null)}
            disabled={!user || meMode === "none" || !(MEMO_FIELDS.some((f) => draft[f.key].trim()) || draft.focusMemo.trim())}
            style={{
              width: "100%", padding: "15px 0", borderRadius: 12, border: "none",
              background: savedFlash ? "#22D07A" : `linear-gradient(90deg, ${C.deep}, ${C.blue})`,
              color: "#fff", fontSize: 16, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
              boxShadow: "0 0 18px rgba(46,168,255,0.35)", opacity: user ? 1 : 0.5,

          <div style={{ fontSize: 11, color: C.mut, marginTop: 8 }}>
            メモの中身は自分だけに保存。仲間には「{user || "あなた"}さんが◯時に練習を記録しました」だけが共有されます
          </div>

        <section style={card}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>

            <button onClick={refreshFeed} style={{ ...ghostBtn, marginBottom: 10 }}>更新</button>

          <div style={{ fontSize: 11, color: C.mut, marginBottom: 10 }}>見えるのは「誰が・いつ・何の練習をしたか」だけ。メモの中身は共有されません</div>
          {feed.length === 0 && (
            <div style={{ textAlign: "center", padding: "18px 8px", border: `1px dashed ${C.line}`, borderRadius: 12 }}>
              <div style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 13, color: C.blue }}>NO ACTIVITY DETECTED</div>

              {feedByDay[k].map((s) => (

                    )}
                  </div>
                </div>
              ))}
            </div>
          ))}
        </section>

        {/* ===== 4. 動画 ===== */}
        <section style={card}>
          <div style={eyebrow}>VIDEO SYNC — 練習動画</div>

          {/* Step 1: YouTubeで投稿 */}
          <div style={{ border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px", marginBottom: 10, background: "#0A101E" }}>
            <div style={{ fontSize: 12, color: C.mut, lineHeight: 1.8, marginBottom: 8 }}>
              <b style={{ color: C.text }}>① YouTubeに投稿</b><br/>
              ボタンを押すとYouTubeの投稿画面が開きます。<b style={{ color: C.cyan }}>「限定公開」</b>でアップロードし、完了したら動画のURLをコピーしてください。
            </div>
            <button onClick={() => window.open("https://www.youtube.com/upload", "_blank")} style={{
              width: "100%", padding: "13px 0", borderRadius: 12, border: "none", fontFamily: "inherit",
              background: `linear-gradient(90deg, ${C.deep}, ${C.blue})`, color: "#fff",
              fontSize: 15, fontWeight: 700, cursor: "pointer", boxShadow: "0 0 18px rgba(46,168,255,0.35)",
            }}>▶ アップロードする（YouTubeが開きます）</button>
          </div>

          {/* Step 2: URL貼り付け + プレビュー */}
          <div style={{ border: `1px solid ${C.line}`, borderRadius: 12, padding: "12px", background: "#0A101E" }}>
            <div style={{ fontSize: 12, color: C.mut, lineHeight: 1.8, marginBottom: 8 }}>
              <b style={{ color: C.text }}>② URLを貼り付けて保存</b>
            </div>
            <input value={videoUrl} onChange={(e) => setVideoUrl(e.target.value)}
              placeholder="コピーしたYouTubeのURLを貼り付け" style={{ ...input, marginBottom: 10 }}/>

            {ytId(videoUrl) && (
              <div style={{ marginBottom: 10 }}>
                <YTCard url={videoUrl.trim()} maxWidth="100%"/>
              </div>
            )}

            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              {[["private", "非公開（自分だけ）"], ["unlisted", "限定公開（仲間に共有）"]].map(([v, label]) => (
                <button key={v} onClick={() => setPrivacy(v)} style={{
                  flex: 1, padding: "11px 4px", borderRadius: 10, fontSize: 13, fontWeight: 700, fontFamily: "inherit",
                  border: `1px solid ${privacy === v ? C.blue : C.line}`,
                  background: privacy === v ? "rgba(46,168,255,0.12)" : "#05070D",
                  color: privacy === v ? C.cyan : C.mut, cursor: "pointer",
                }}>{label}</button>
              ))}
            </div>
            <button onClick={saveVideo} disabled={!ytId(videoUrl)} style={{
              width: "100%", padding: "13px 0", borderRadius: 12, fontFamily: "inherit",
              border: `1px solid ${C.blue}`, background: "none",
              color: !ytId(videoUrl) ? C.mut : C.cyan, fontSize: 14, fontWeight: 700, cursor: "pointer",
            }}>{privacy === "unlisted" ? "タイムラインに共有する" : "非公開で保存する"}</button>
          </div>

          {/* 非公開で保存した自分の動画 */}
          {(me.videos || []).length > 0 && (
            <div style={{ marginTop: 12 }}>
              <div style={{ fontSize: 12, color: C.mut, marginBottom: 8 }}>非公開の保存動画（自分だけ）</div>
              {(me.videos || []).map((v) => (
                <div key={v.id} style={{ marginBottom: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ fontSize: 11, color: C.mut }}>{fmtDay(v.ts)} {fmtTime(v.ts)}</div>
                    <button onClick={() => deleteVideo(v.id)} style={ghostBtn}>削除</button>
                  </div>
                  <YTCard url={v.url} maxWidth={260}/>
                </div>
              ))}
            </div>
          )}
        </section>

        {/* ===== 5. 自分の過去メモ ===== */}
        <section style={card}>
          <div style={eyebrow}>MY NOTES — これまでの記録</div>
          {me.entries.length === 0 && (
            <div style={{ textAlign: "center", padding: "18px 8px", border: `1px dashed ${C.line}`, borderRadius: 12 }}>
              <div style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 13, color: C.blue }}>NO DATA DETECTED</div>
              <div style={{ fontSize: 11, color: C.mut, marginTop: 4 }}>まだ記録がありません。今日の練習から始めましょう</div>
            </div>
          )}
          {me.entries.map((e) => (
            <div key={e.id} style={{ border: `1px solid ${C.line}`, borderRadius: 12, marginBottom: 8, overflow: "hidden", background: "#0A101E" }}>
              <button onClick={() => setOpenPast(openPast === e.id ? null : e.id)} style={{
                width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center",
                padding: "12px 14px", background: "none", border: "none", color: C.text,
                fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
              }}>
                <span>{fmtDay(e.ts)} <span style={{ fontFamily: "'Share Tech Mono', monospace", color: C.blue }}>{fmtTime(e.ts)}</span> <span style={{ color: C.mut, fontWeight: 400, fontSize: 12 }}>{e.discipline ? `${e.discipline}(${e.category})` : e.category}</span></span>
                <span style={{ color: C.mut, fontSize: 12 }}>{openPast === e.id ? "閉じる" : "開く"}</span>
              </button>
              {openPast === e.id && (
                <div style={{ padding: "0 14px 12px" }}>
                  {(e.focusMemo || "").trim() && (
                    <Row label="意識したことへの一言" color={C.blue} text={e.focusMemo}/>
                  )}
                  {MEMO_FIELDS.map((f) => (e[f.key] || "").trim() ? <Row key={f.key} label={f.label} color={f.accent} text={e[f.key]}/> : null)}
                  <button onClick={() => deleteEntry(e.id)} style={{ ...ghostBtn, marginTop: 4 }}>削除</button>
                </div>
              )}
            </div>
          ))}
        </section>

        {/* ===== 6. MY DASHBOARD(優先度低のため下部へ) ===== */}
        <section style={card}>
          <div style={eyebrow}>MY DASHBOARD — {user || "あなた"}</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
            {[["week", "今週", weekCount], ["month", "今月", monthCount], ["year", "今年", yearCount]].map(([p, label, v]) => (
              <button key={p} onClick={() => setPeriod(p)} style={{
                background: period === p ? "rgba(46,168,255,0.1)" : "#0A101E",
                border: `1px solid ${period === p ? C.blue : C.line}`,
                boxShadow: period === p ? "0 0 16px rgba(46,168,255,0.25)" : "none",
                borderRadius: 12, padding: "12px 6px", textAlign: "center",
                cursor: "pointer", fontFamily: "inherit",
              }}>
                <div style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 30, color: C.blue, textShadow: "0 0 14px rgba(46,168,255,0.45)" }}><CountUp value={v}/></div>
                <div style={{ fontSize: 11, color: period === p ? C.cyan : C.mut, marginTop: 2 }}>{label}</div>
              </button>
            ))}
          </div>
          <div style={{ fontSize: 12, color: C.mut, margin: "12px 0 8px" }}>
            {PERIOD_LABEL[period]}の練習マップ（種目 × カテゴリ）
          </div>
          {heat.total === 0 ? (
            <div style={{ padding: "22px 8px", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", border: `1px dashed ${C.line}`, borderRadius: 12 }}>
              <div style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 13, color: C.blue }}>NO DATA DETECTED</div>
              <div style={{ fontSize: 11, color: C.mut, marginTop: 4 }}>{PERIOD_LABEL[period]}の記録はまだありません</div>
            </div>
          ) : (
            <div style={{ overflowX: heat.cols.length > 6 ? "auto" : "visible", paddingBottom: 4 }}>
              <div style={{ minWidth: heat.cols.length > 6 ? 44 + heat.cols.length * 46 : 0 }}>
                {/* 列ヘッダー */}
                <div style={{ display: "grid", gridTemplateColumns: `44px repeat(${heat.cols.length}, 1fr)`, gap: 4, marginBottom: 4 }}>
                  <div/>
                  {heat.cols.map((c0) => (
                    <div key={c0} style={{ fontSize: 10, color: C.mut, textAlign: "center", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{c0.slice(0, 4)}</div>
                  ))}
                </div>
                {/* 行 */}
                {DISCIPLINES.map((d0) => (
                  <div key={d0} style={{ display: "grid", gridTemplateColumns: `44px repeat(${heat.cols.length}, 1fr)`, gap: 4, marginBottom: 4 }}>
                    <div style={{ fontSize: 11, color: C.text, fontWeight: 700, display: "flex", alignItems: "center" }}>{d0}</div>
                    {heat.cols.map((c0) => {
                      const c = heat.counts[`${d0}||${c0}`] || 0;
                      return (
                        <div key={c0} title={`${d0}(${c0}): ${c}回`} style={{
                          aspectRatio: "1.4", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center",
                          fontFamily: "'Share Tech Mono', monospace", fontSize: 13, fontWeight: 700,
                          transition: "background 0.4s, box-shadow 0.4s",
                          ...heatStyle(c),
                        }}>{c || ""}</div>
                      );
                    })}
                  </div>
                ))}
                {/* 凡例 */}
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginTop: 8 }}>
                  <span style={{ fontSize: 10, color: C.mut }}>0回</span>
                  {[0, 1, 2, 3, 4].map((n) => (
                    <span key={n} style={{ width: 18, height: 12, borderRadius: 3, ...heatStyle(n), color: "transparent" }}/>
                  ))}
                  <span style={{ fontSize: 10, color: C.mut }}>4回以上</span>
                </div>
              </div>
            </div>
          )}

          {/* AIコーチ: 今週のアドバイス */}
          <div style={{
            marginTop: 14, border: `1px solid ${C.blue}`, borderRadius: 12,
            padding: "12px 14px", background: "linear-gradient(135deg, rgba(46,168,255,0.08) 0%, rgba(10,90,214,0.04) 100%)",
            boxShadow: "0 0 16px rgba(46,168,255,0.12)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <span style={{ fontFamily: "'Rajdhani', sans-serif", letterSpacing: "0.22em", fontSize: 11, color: C.cyan, fontWeight: 700 }}>COACH AI</span>
              <span style={{ fontFamily: "'Share Tech Mono', monospace", fontSize: 10, color: C.blue, border: `1px solid ${C.deep}`, borderRadius: 999, padding: "1px 8px" }}>{coachAdvice.tag}</span>
            </div>
            <div style={{ fontSize: 13, lineHeight: 1.9 }}>{coachAdvice.text}</div>
          </div>
        </section>

        {/* ===== 7. 目安箱への入口(記入欄は遷移先) ===== */}
        <button onClick={() => setPage("suggestion")} style={{
          width: "100%", padding: "15px 0", borderRadius: 12, fontFamily: "inherit",
          border: `1px solid ${C.line}`, background: "#0A101E", color: C.mut,
          fontSize: 14, fontWeight: 700, cursor: "pointer",
        }}>📮アプリの感想大募集＼(^o^)／</button>
      </main>
    </Shell>
  );
}

function InlinePlayer({ vid }) {
  return (
    <div style={{ position: "relative", width: "100%", aspectRatio: "16/9", borderRadius: 10, overflow: "hidden", border: "1px solid #2EA8FF", background: "#000", boxShadow: "0 0 16px rgba(46,168,255,0.3)" }}>
      <iframe
        src={`https://www.youtube-nocookie.com/embed/${vid}?playsinline=1&autoplay=1&rel=0`}
        title="練習動画"
        style={{ position: "absolute", inset: 0, width: "100%", height: "100%", border: 0 }}
        allow="autoplay; encrypted-media; picture-in-picture"
        allowFullScreen
      />
    </div>
  );
}

function Row({ label, color, text }) {
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color, marginBottom: 3 }}>{label}</div>
      <div style={{ fontSize: 13, lineHeight: 1.7, whiteSpace: "pre-wrap", color: "#C6D4E8" }}>{text}</div>
    </div>
  );
}

function Popup({ children, onClose }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(3,6,12,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50, padding: 24 }}>
      <div style={{
        background: "linear-gradient(180deg, #0E1729 0%, #0B1220 100%)", border: "1px solid #2EA8FF",
        borderRadius: 14, padding: "20px 18px", maxWidth: 340, textAlign: "center",
        boxShadow: "0 0 40px rgba(46,168,255,0.35)",
      }}>
        {children}
        <button onClick={onClose} style={{
          marginTop: 14, padding: "10px 26px", borderRadius: 10, fontFamily: "inherit",
          border: "1px solid #2EA8FF", background: "rgba(46,168,255,0.12)", color: "#5FD9FF",
          fontSize: 13, fontWeight: 700, cursor: "pointer",
        }}>閉じる</button>
      </div>
    </div>
  );
}

function Shell({ children }) {
  return (
    <div style={{
      minHeight: "100vh", background: "radial-gradient(1200px 500px at 50% -10%, #0B1A33 0%, #05070D 55%)",
      color: "#E8F1FB", fontFamily: "'Zen Kaku Gothic New', 'Hiragino Sans', sans-serif",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        textarea:focus, input:focus, select:focus { outline: 2px solid #2EA8FF; outline-offset: 1px; }
        button:focus-visible { outline: 2px solid #5FD9FF; outline-offset: 2px; }
        .blink { animation: blink 0.8s steps(2) infinite; }
        @keyframes blink { to { opacity: 0; } }
        @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
      `}</style>
      {children}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<GymLog/>);
</script>
</body>
</html>
